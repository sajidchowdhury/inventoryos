; ── InventoryOS PgBouncer configuration ──
; Mounted read-only at /etc/pgbouncer/pgbouncer.ini inside the pgbouncer container.
; The edoburu/pgbouncer image substitutes ${DB_PASSWORD} from the container env.
;
; See docker/pgbouncer/README.md for tuning guidance and verification commands.

[databases]
; Each entry maps a logical db name (left) to a real Postgres connection (right).
; The app connects to `inventoryos` on port 6432; PgBouncer forwards to `db:5432`.
inventoryos = host=db port=5432 dbname=inventoryos user=inventoryos password=${DB_PASSWORD}

[pgbouncer]
; ── Listener ──
; 0.0.0.0 so the container's published port (127.0.0.1:6432 on the host) is reachable.
listen_addr = 0.0.0.0
listen_port = 6432

; ── Auth ──
; trust = accept any password (we're inside a private Docker network; the host
; port is bound to 127.0.0.1 only). For multi-host deploys, switch to md5 and
; populate userlist.txt with `md5` hashes (see README.md).
auth_type = trust

; ── Pooling model ──
; transaction = release the server connection back to the pool at every COMMIT/ROLLBACK.
; This maximises reuse for short web requests (Prisma's default mode) but BREAKS
; session-level features: SET search_path, LISTEN/NOTIFY, advisory locks, temp tables.
; → Use DIRECT_DATABASE_URL (db:5432) for any code that needs those features.
pool_mode = transaction

; ── Capacity ──
; max_client_conn — total client TCP connections PgBouncer will accept.
;   200 is comfortable for a single app node running ~50-100 concurrent requests.
; default_pool_size — persistent server connections kept open per db/user combo.
;   20 is a good starting point; Postgres default max_connections=100.
; reserve_pool_size — extra connections spawned when the pool is exhausted
;   (gives short bursts headroom before clients see "no more connections").
max_client_conn = 200
default_pool_size = 20
reserve_pool_size = 5

; ── Timeouts (seconds) ──
; client_idle_timeout — drop idle client conns to free fds (10 min).
; server_idle_timeout — close pooled server conns that have been idle (60 min)
;   so Postgres doesn't hold them forever.
client_idle_timeout = 600
server_idle_timeout = 3600

; ── Compatibility ──
; Prisma and several ORMs send these startup params; PgBouncer would refuse
; the connection otherwise. `extra_float_digits` is sent by libpq by default,
; `search_path` is sent by some pools, `application_name` by Prisma's logger.
ignore_startup_parameters = extra_float_digits,search_path,application_name

; ── Hygiene ──
; Reset session state between transactions so one client cannot leak
; temp tables / SET vars into another client's transaction on the same
; pooled server connection. Required for transaction pool mode safety.
server_reset_query = DISCARD ALL

; ── Admin ──
; `inventoryos` can connect to the virtual `pgbouncer` admin database
; (e.g. `psql -h pgbouncer -p 6432 pgbouncer -U inventoryos -c 'SHOW POOLS;'`).
admin_users = inventoryos

; ── Logging ──
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
